[env:featheresp32]
platform = espressif32
board = featheresp32
framework = arduino
upload_speed = 460800
monitor_speed = 115200
upload_port = COM6              ;different clocks have different ports
monitor_port = COM6              ;different clocks have different ports

lib_deps =
    majicdesigns/MD_MAX72XX @ ^3.5.1
    majicdesigns/MD_Parola @ ^3.7.5
    knolleary/PubSubClient @ ^2.8
    ArduinoJson
    Timezone
    Time
    RTClib
    OneWire
    DallasTemperature

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_LOG_LEVEL=0
    -D "APP_VERSION=\"v2.0.1\""

lib_ldf_mode = deep+

build_src_filter = 
  +<main.cpp>
  ;+<main-test-parola.cpp>
  ;+<main-parola-zone-test.cpp>
  ;+<main-parola-myLibraries.cpp>

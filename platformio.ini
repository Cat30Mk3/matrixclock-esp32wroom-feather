[platformio]
default_envs = featheresp32


[env:featheresp32]
platform = espressif32
board = featheresp32
framework = arduino
upload_speed = 460800
monitor_speed = 115200
upload_port = COM9            ;different clocks have different ports
monitor_port = COM9              ;different clocks have different ports
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    majicdesigns/MD_MAX72XX @ ^3.5.1
    majicdesigns/MD_Parola @ ^3.7.5
    knolleary/PubSubClient @ ^2.8
    ArduinoJson
    Timezone
    Time
    RTClib
    OneWire
    DallasTemperature

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_LOG_LEVEL=0
    -D "APP_VERSION=\"v3.0.0\""
    -I include

lib_ldf_mode = deep+

build_src_filter = 
  +<main.cpp>
  ;+<main-test-parola.cpp>
  ;+<main-parola-zone-test.cpp>
  ;+<main-parola-myLibraries.cpp>

[env:featheresp32-max72xx-bare]
platform = espressif32
board = featheresp32
framework = arduino
upload_speed = 460800
monitor_speed = 115200
upload_port = COM8
monitor_port = COM8
monitor_dtr = 0
monitor_rts = 0

lib_deps =
        majicdesigns/MD_MAX72XX @ ^3.5.1

build_flags =
        -D CORE_DEBUG_LEVEL=0
        -D ARDUINO_LOG_LEVEL=0

build_src_filter =
    +<main-max72xx-bare-test.cpp>
